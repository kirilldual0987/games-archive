<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="free-games-byKirilldual - Каталог игр и ПО">
  <title>free-games-byKirilldual</title>
  <style>
    :root {
      --bg: #0a0a14;
      --card-bg: rgba(18, 18, 30, 0.75);
      --accent: #00f3ff;
      --accent2: #ff0055;
      --text: #e6e6ef;
      --text-muted: #8a8a9b;
      --glass: rgba(255, 255, 255, 0.06);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(0, 243, 255, 0.08) 0%, transparent 25%),
        radial-gradient(circle at 85% 80%, rgba(255, 0, 85, 0.08) 0%, transparent 25%);
    }
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--glass);
      backdrop-filter: blur(8px);
    }
    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0;
      letter-spacing: -0.5px;
    }
    main {
      flex: 1;
      padding: 2rem 1rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    #games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--glass);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow), 0 0 20px rgba(0, 243, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .card:hover::before { opacity: 1; }
    .card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .card h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }
    .card .meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .card .tag {
      font-size: 0.7rem;
      color: var(--text);
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 999px;
      font-family: monospace;
    }
    .card .tag.platform { background: rgba(0, 243, 255, 0.15); color: var(--accent); }
    .card .tag.type { background: rgba(255, 0, 85, 0.15); color: var(--accent2); }
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #05050a;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 243, 255, 0.25);
    }
    .btn-download:hover {
      filter: brightness(1.15);
      transform: scale(1.03);
      box-shadow: 0 6px 18px rgba(255, 0, 85, 0.35);
    }
    .status {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .loader {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--glass);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--glass);
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(8px);
    }
    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      #games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>free-games-byKirilldual</h1>
  </header>

  <main id="games-container">
    <div class="status">
      <div class="loader"></div><br>
      Загрузка списка...
    </div>
  </main>

  <footer>
    © 2026 kirilldual
  </footer>

  <script>
    // 🔒 ОБХОД БЛОКИРОВКИ РКН:
    // raw.githubusercontent.com блокируется в РФ. 
    // Загружаем файл по относительному пути ./gamelist.txt, 
    // чтобы запрос шёл на тот же домен (github.io), который доступен.
    const GAMES_FILE = './gamelist.txt';
    const container = document.getElementById('games-container');

    async function loadGames() {
      try {
        // ?t=... отключает кэш браузера, чтобы новые игры появлялись сразу
        const res = await fetch(`${GAMES_FILE}?t=${Date.now()}`);
        if (!res.ok) throw new Error(`Файл не найден или недоступен (${res.status})`);

        const text = await res.text();
        const lines = text.split('\n');
        const games = [];

        for (let line of lines) {
          line = line.trim();
          if (!line) continue;

          // Парсим формат: "Название : Платформа : Тип : Ссылка"
          const match = line.match(/^(.+?)\s*:\s*(.+?)\s*:\s*(.+?)\s*:\s*(.+)$/);
          if (match) {
            games.push({
              name: match[1].trim(),
              platform: match[2].trim(),
              type: match[3].trim(),
              url: match[4].trim()
            });
          }
        }

        renderGames(games);
      } catch (err) {
        console.error('❌ Ошибка загрузки:', err);
        container.innerHTML = `
          <div class="status">
            ⚠️ Не удалось загрузить список игр.<br><br>
            <small>
              1. Убедись, что gamelist.txt лежит в корне репозитория.<br>
              2. Если сайт открывается, но список пуст — проверь консоль (F12).<br>
              3. В редких случаях провайдеры режут .github.io. Если так — пиши, дам инструкцию по зеркалу.
            </small>
          </div>`;
      }
    }

    function renderGames(games) {
      container.innerHTML = '<div id="games-grid"></div>';
      const grid = document.getElementById('games-grid');

      if (games.length === 0) {
        grid.innerHTML = '<div class="status">📂 Список пуст. Добавь записи в gamelist.txt</div>';
        return;
      }

      games.forEach(game => {
        const safeName = escapeHtml(game.name);
        const safePlatform = escapeHtml(game.platform);
        const safeType = escapeHtml(game.type);
        const icon = getTypeIcon(safeType);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-icon">${icon}</div>
          <h3>${safeName}</h3>
          <div class="meta">
            <span class="tag platform">💻 ${safePlatform}</span>
            <span class="tag type">📦 ${safeType}</span>
          </div>
          <a href="${game.url}" class="btn-download" target="_blank" rel="noopener noreferrer">
            ⬇ Download ${safeName}
          </a>
        `;
        grid.appendChild(card);
      });
    }

    function getTypeIcon(type) {
      const t = type.toLowerCase();
      if (t.includes('game')) return '🎮';
      if (t.includes('soft') || t.includes('program') || t.includes('app')) return '💻';
      if (t.includes('emu') || t.includes('emulator')) return '🕹️';
      if (t.includes('tool') || t.includes('util')) return '🔧';
      return '📦';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadGames);
  </script>
</body>
</html>
